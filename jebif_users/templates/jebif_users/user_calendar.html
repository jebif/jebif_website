
{% extends 'jebif_website/base.html'%}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
{% endblock head %}


{% block content %}
<h1>Calendrier des évènements</h1>


<form style="display:none;">
    {% csrf_token %}
</form>

<div id="calendar"></div>

<script>
    function getCSRFToken() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
        }

    document.addEventListener('DOMContentLoaded', function () {

        var calendarEl = document.getElementById('calendar');

        window.calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            selectable: true,

            eventClick: function(info) {
                message=""
                if (info.event.extendedProps.localisation && info.event.extendedProps.max_participants){
                    message= info.event.title 
                    +"\nLocalisation : "+ info.event.extendedProps.localisation 
                    +"\nNombre maximum de participants (-1 = illimité): "+ info.event.extendedProps.max_participants
                    +"\nDescription : "+ info.event.extendedProps.description
                } else{
                    message= info.event.title +"\nDescription : "+ info.event.extendedProps.description
                }
                alert(message);
            },

            events: {
                url: "{% url 'events_json' %}",
                failure: function() {
                    alert("Erreur de chargement des événements");
                }
            }
        });
    
        calendar.render();
    });
</script>


{% endblock content %}
